# monitoring/prometheus.yml
#
# Scrape targets:
#   gateway        — instance 1 on GATEWAY_METRICS_PORT 9101 (host)
#   gateway2       — instance 2 on GATEWAY_METRICS_PORT 9102 (host)
#   nginx          — nginx-prometheus-exporter sidecar (Docker service)
#   vllm_standard  — Modal vLLM Gemma4 standard deployment  (server_profile=default)
#   vllm_optimized — Modal vLLM Gemma4 optimized deployment (server_profile=optimized)
#   vllm_hardcore  — Modal vLLM Gemma4 hardcore deployment  (fp8 KV cache)
#
# Docker resolves host.docker.internal → host machine.
# Set VLLM_SERVER_PROFILE in .env to label gateway metrics accordingly.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ["host.docker.internal:9101"]
    metrics_path: /metrics

  - job_name: gateway2
    static_configs:
      - targets: ["host.docker.internal:9102"]
    metrics_path: /metrics

  - job_name: nginx
    static_configs:
      - targets: ["nginx-exporter:9113"]
    metrics_path: /metrics

  - job_name: vllm_standard
    scheme: https
    static_configs:
      - targets: ["ingo-villnow--vllm-gemma4-standard-serve.modal.run"]
    metrics_path: /metrics

  - job_name: vllm_optimized
    scheme: https
    static_configs:
      - targets: ["ingo-villnow--vllm-gemma4-optimized-serve.modal.run"]
    metrics_path: /metrics

  # Update target after deploying: bash scripts/deploy_modal_vllm.sh hardcore
  - job_name: vllm_hardcore
    scheme: https
    static_configs:
      - targets: ["ingo-villnow--vllm-gemma4-hardcore-serve.modal.run"]
    metrics_path: /metrics
